<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Favicons -->
  <link rel="icon" type="image/png" href="sz-herbals-favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="sz-herbals-favicon/favicon.svg" />
  <link rel="shortcut icon" href="sz-herbals-favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="sz-herbals-favicon/apple-touch-icon.png" />
  <link rel="manifest" href="sz-herbals-favicon/site.webmanifest" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figuva — Strength & Vitality | Pure Ficus carica & Olea europaea Herbal Syrup | SZ Herbals</title>
  <meta name="description"
    content="Figuva is a 100% organic herbal syrup of pure Ficus carica and Olea europaea — backed by traditional medicine. Builds muscle strength, bone density, energy and vitality for all ages. by SZ Herbals." />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Montserrat:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="cart.css"/>
  <script src="cart.js" defer></script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --deep: #111111;
      --dark: #1e1e1e;
      --mid: #3a3a3a;
      --purple: #4A1A78;
      --violet: #7A3AA8;
      --lavender: #A878D8;
      --mist: #d5d5d3;
      --fog: #f0f0ee;
      --cream: #f7f7f5;
      --olive: #3A5828;
      --olivem: #5A7838;
      --olivel: #8AAA58;
      --gold: #C4920A;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --display: 'DM Serif Display', Georgia, serif;
      --sans: 'Montserrat', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #fff;
      color: var(--deep);
      font-family: var(--serif);
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 5rem;
      transition: all .4s;
    }

    nav.scrolled {
      background: rgba(247, 247, 245, .97);
      backdrop-filter: blur(12px);
      padding: 1rem 5rem;
      border-bottom: .5px solid var(--mist);
    }

    .nav-brand {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--deep);
      letter-spacing: .06em;
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .nav-brand span.brand-by {
      font-family: var(--sans);
      font-size: .6rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--mid);
      margin-left: .4rem;
      opacity: .8;
    }

    .nav-brand a {
      color: inherit;
      text-decoration: none;
      transition: color .3s;
    }

    .nav-brand a:hover {
      color: var(--violet);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--sans);
      font-size: .68rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color .3s;
    }

    .nav-links a:hover {
      color: var(--violet);
    }

    .nav-cta {
      font-family: var(--sans);
      font-size: .68rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      background: var(--dark);
      color: var(--fog);
      padding: .7rem 1.6rem;
      border: none;
      text-decoration: none;
      transition: background .3s;
    }

    .nav-cta:hover {
      background: var(--deep);
    }

    /* E-COMMERCE HERO LAYOUT */
    .hero {
      min-height: auto;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 4rem;
      padding: 9rem 5rem 5rem;
      max-width: 1300px;
      margin: 0 auto;
      align-items: start;
    }

    .product-gallery-container {
      position: sticky;
      top: 120px;
      display: flex;
      gap: 1.5rem;
    }

    .gallery-thumbnails {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .thumb-item {
      width: 80px;
      height: 80px;
      border: 1px solid var(--mist);
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      padding: 6px;
    }

    .thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .thumb-item:hover,
    .thumb-item.active {
      border-color: var(--violet);
      box-shadow: 0 0 0 1px var(--violet);
    }

    .main-image-view {
      flex: 1;
      background: #fff;
      border: 1px solid var(--mist);
      height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .main-image-view img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      max-height: 480px;
      transition: opacity 0.3s ease;
      padding: 1rem;
    }

    /* Buy Box Styling */
    .buy-box-container {
      display: flex;
      flex-direction: column;
      background: transparent;
    }

    .buy-box-brand {
      font-family: var(--sans);
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      color: var(--violet);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    .buy-box-title {
      font-family: var(--display);
      font-size: clamp(2.5rem, 4.5vw, 3.8rem);
      line-height: 1.05;
      font-weight: 400;
      color: var(--deep);
      margin-bottom: 0.6rem;
    }

    .buy-box-rating {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--sans);
      font-size: 0.72rem;
      color: var(--mid);
      margin-bottom: 1.2rem;
    }

    .buy-box-rating .stars {
      color: var(--violet);
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    .buy-box-tagline {
      font-family: var(--serif);
      font-size: 1.25rem;
      line-height: 1.5;
      color: var(--mid);
      margin-bottom: 1.8rem;
      font-style: italic;
    }

    .buy-box-benefits {
      display: grid;
      gap: 0.8rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--mist);
    }

    .benefit-bullet {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
    }

    .benefit-bullet svg {
      width: 16px;
      height: 16px;
      color: var(--violet);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .benefit-bullet span {
      font-family: var(--sans);
      font-size: 0.76rem;
      line-height: 1.5;
      color: var(--dark);
      font-weight: 300;
    }

    /* Variant Selector */
    .variant-selector-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 2rem;
    }

    .selector-label {
      font-family: var(--sans);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      font-weight: 500;
      margin-bottom: 0.2rem;
    }

    .variant-card {
      border: 1.5px solid var(--mist);
      padding: 1.2rem;
      background: #fff;
      cursor: pointer;
      position: relative;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .variant-card:hover {
      border-color: var(--violet);
    }

    .variant-card.active {
      border-color: var(--violet);
      background: rgba(122, 58, 168, 0.03);
    }

    .variant-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }

    .variant-name {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--deep);
    }

    .variant-badge {
      font-family: var(--sans);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      background: var(--dark);
      color: var(--fog);
      padding: 0.25rem 0.6rem;
      font-weight: 500;
    }

    .variant-badge.bundle-badge {
      background: var(--violet);
      color: #fff;
    }

    .variant-desc {
      font-family: var(--sans);
      font-size: 0.7rem;
      color: var(--mid);
      font-weight: 300;
      line-height: 1.4;
      margin-bottom: 0.8rem;
    }

    .variant-pricing {
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
    }

    .v-price {
      font-family: var(--display);
      font-size: 1.6rem;
      color: var(--deep);
    }

    .v-currency {
      font-family: var(--sans);
      font-size: 0.72rem;
      color: var(--mid);
      font-weight: 300;
    }

    .v-original {
      font-family: var(--display);
      font-size: 1.15rem;
      color: var(--mid);
      text-decoration: line-through;
      opacity: 0.5;
    }

    .v-save {
      font-family: var(--sans);
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      color: var(--violet);
      font-weight: 500;
      text-transform: uppercase;
    }

    /* Qty & Action Row */
    .qty-and-action-wrap {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      align-items: stretch;
    }

    .qty-selector {
      display: flex;
      align-items: center;
      border: 1px solid var(--mist);
      background: #fff;
    }

    .qty-btn {
      width: 44px;
      height: 100%;
      background: none;
      border: none;
      font-family: var(--sans);
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--mid);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .qty-btn:hover {
      background: var(--fog);
    }

    .qty-number {
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--deep);
      min-width: 30px;
      text-align: center;
    }

    .btn-buy-now {
      flex: 1;
      font-family: var(--sans);
      font-size: 0.76rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      background: var(--dark);
      color: var(--fog);
      padding: 1.1rem 2rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      font-weight: 500;
      text-align: center;
    }

    .btn-buy-now:hover {
      background: var(--deep);
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(122, 58, 168, 0.15);
    }

    .buy-box-shipping-note,
    .buy-box-guarantee {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-family: var(--sans);
      font-size: 0.72rem;
      color: var(--mid);
      margin-bottom: 0.8rem;
      font-weight: 300;
    }

    .buy-box-shipping-note svg,
    .buy-box-guarantee svg {
      width: 16px;
      height: 16px;
      color: var(--violet);
      flex-shrink: 0;
    }

    .buy-box-trust-badges {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-top: 1.8rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--mist);
      flex-wrap: wrap;
    }

    .badge-tag {
      font-family: var(--sans);
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      color: var(--mid);
      border: 1px solid var(--mist);
      padding: 0.35rem 0.6rem;
      font-weight: 500;
      background: var(--fog);
    }

    /* STICKY BUY BAR */
    .sticky-buy-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 95;
      background: rgba(20, 10, 30, 0.97);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(122, 58, 168, 0.2);
      padding: 0.9rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .sticky-buy-bar.visible {
      transform: translateY(0);
    }

    .sbb-product {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .sbb-img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
    }

    .sbb-name {
      font-family: var(--display);
      font-size: 1.1rem;
      color: var(--fog);
      font-style: italic;
    }

    .sbb-tagline {
      font-family: var(--sans);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--violet);
      text-transform: uppercase;
    }

    .sbb-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .sbb-price {
      font-family: var(--display);
      font-size: 1.4rem;
      color: var(--fog);
    }

    .sbb-price small {
      font-family: var(--sans);
      font-size: 0.65rem;
      color: var(--violet);
      font-style: normal;
      letter-spacing: 0.1em;
    }

    .sbb-btn {
      font-family: var(--sans);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      background: var(--violet);
      color: var(--fog);
      padding: 0.85rem 2rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .sbb-btn:hover {
      background: #5e2a85;
    }

    /* STICKY PRODUCT NAV */
    .product-nav {
      position: sticky;
      top: 60px;
      background: rgba(247, 244, 238, .9);
      backdrop-filter: blur(10px);
      z-index: 90;
      border-bottom: .5px solid var(--mist);
      padding: 0 5rem;
      display: none;
      justify-content: center;
    }

    .product-nav.visible {
      display: flex;
    }

    .product-nav-links {
      display: flex;
      list-style: none;
    }

    .product-nav-links a {
      font-family: var(--sans);
      font-size: .6rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--mid);
      padding: 1.2rem 1.5rem;
      text-decoration: none;
      transition: color .3s;
      border-bottom: 2px solid transparent;
    }

    .product-nav-links a:hover {
      color: var(--violet);
    }

    .product-nav-links a.active {
      color: var(--deep);
      border-bottom-color: var(--violet);
    }

    /* MARQUEE */
    .marquee {
      background: var(--dark);
      padding: .9rem 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .marquee-track {
      display: inline-flex;
      animation: marquee 26s linear infinite;
    }

    .m-item {
      font-family: var(--sans);
      font-size: .62rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--mist);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .m-dot {
      width: 3px;
      height: 3px;
      background: var(--lavender);
      border-radius: 50%;
      flex-shrink: 0;
    }

    @keyframes marquee {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    /* SECTIONS */
    .section {
      padding: 5rem 6rem;
    }

    .section-label {
      font-family: var(--sans);
      font-size: .64rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--lavender);
      margin-bottom: 1.2rem;
    }

    .section-h2 {
      font-family: var(--display);
      font-size: clamp(1.6rem, 2.5vw, 2.6rem);
      font-weight: 400;
      line-height: 1.15;
      color: var(--deep);
      margin-bottom: 1rem;
    }

    .section-h2 em {
      font-style: italic;
      color: var(--violet);
    }

    /* QURAN SECTION */
    .quran-section {
      background: var(--dark);
      padding: 8rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .quran-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(122, 58, 168, .15) 0%, transparent 70%);
    }

    .quran-inner {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
    }

    .arabic-big {
      font-family: var(--serif);
      font-size: clamp(2.4rem, 5vw, 4.8rem);
      color: var(--mist);
      line-height: 1.4;
      margin-bottom: 1.4rem;
      letter-spacing: .06em;
    }

    .arabic-trans {
      font-family: var(--display);
      font-size: clamp(1.4rem, 2.5vw, 2.2rem);
      font-style: italic;
      color: var(--lavender);
      margin-bottom: 1rem;
      line-height: 1.4;
    }

    .arabic-source {
      font-family: var(--sans);
      font-size: .68rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(168, 120, 216, .5);
    }

    .quran-body {
      font-family: var(--sans);
      font-size: .8rem;
      line-height: 2;
      font-weight: 300;
      color: var(--mist);
      margin-top: 2.4rem;
      opacity: .8;
    }

    /* WHY SECTION */
    .why-grid {
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 5rem;
      align-items: start;
      margin-top: 4rem;
    }

    .why-text p {
      font-family: var(--sans);
      font-size: .8rem;
      line-height: 2;
      font-weight: 300;
      color: var(--mid);
      margin-bottom: 1.2rem;
    }

    .why-card {
      background: var(--dark);
      padding: 3rem;
    }

    .why-card h3 {
      font-family: var(--display);
      font-size: 1.6rem;
      color: var(--fog);
      margin-bottom: 2rem;
      font-style: italic;
    }

    /* INGREDIENT CARDS */
    .ing-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-top: 4rem;
    }

    .ing-card {
      padding: 3rem;
      position: relative;
      overflow: hidden;
      transition: transform .3s;
    }

    .ing-card:hover {
      transform: translateY(-4px);
    }

    .ing-card.fig {
      background: var(--dark);
      border-top: 2px solid var(--violet);
    }

    .ing-card.olive {
      background: var(--olive);
      border-top: 2px solid var(--olivel);
    }

    .ing-icon-wrap {
      width: 64px;
      height: 64px;
      margin-bottom: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ing-card h4 {
      font-family: var(--display);
      font-size: 2rem;
      margin-bottom: .3rem;
      font-style: italic;
    }

    .ing-card.fig h4 {
      color: var(--mist);
    }

    .ing-card.olive h4 {
      color: #E8F0D0;
    }

    .ing-local {
      font-family: var(--sans);
      font-size: .6rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .ing-card.fig .ing-local {
      color: var(--lavender);
    }

    .ing-card.olive .ing-local {
      color: var(--olivel);
    }

    .ing-card p {
      font-family: var(--sans);
      font-size: .78rem;
      line-height: 1.9;
      font-weight: 300;
    }

    .ing-card.fig p {
      color: var(--mist);
    }

    .ing-card.olive p {
      color: #C8D8A8;
    }

    .ing-benefits {
      margin-top: 1.4rem;
      padding-top: 1.4rem;
      display: grid;
      gap: .6rem;
    }

    .ing-benefit {
      display: flex;
      align-items: center;
      gap: .8rem;
      font-family: var(--sans);
      font-size: .7rem;
      font-weight: 300;
    }

    .ing-card.fig .ing-benefit {
      color: var(--mist);
      border-top: .5px solid rgba(255, 255, 255, .06);
      padding-top: .6rem;
    }

    .ing-card.olive .ing-benefit {
      color: #C8D8A8;
      border-top: .5px solid rgba(255, 255, 255, .06);
      padding-top: .6rem;
    }

    .ing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .fig-dot {
      background: var(--lavender);
    }

    .olive-dot {
      background: var(--olivel);
    }

    /* STRENGTH SECTION */
    .strength {
      background: var(--dark);
      padding: 5rem 6rem;
    }

    .strength .section-label {
      color: var(--lavender);
    }

    .strength .section-h2 {
      color: var(--fog);
    }

    .strength .section-h2 em {
      color: var(--lavender);
    }

    .strength-grid {

      <div class="footer-grid">

          <p>Pure Ficus carica and Olea europaea. 100% organic, zero chemicals. Strength, vitality and bone density from nature's most sacred botanicals.</p>
        </div>

          <h5>Product</h5>

            <li><a href="#ingredients">Ingredients</a></li>
            <li><a href="#dosage">Dosage Guide</a></li>

          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="glukora.html">Glukora (Diabetes)</a></li>

  <script>
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 60));

    // Mobile menu
    const hamburger = document.getElementById('hamburger');
    const overlay = document.getElementById('mobileOverlay');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      overlay.classList.toggle('open');
      document.body.style.overflow = overlay.classList.contains('open') ? 'hidden' : '';
    });
    document.querySelectorAll('.mobile-nav-link').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('active');
        overlay.classList.remove('open');
        document.body.style.overflow = '';
      });
    });
    const obs = new IntersectionObserver(entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }), { threshold: .12 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    window.addEventListener('load', () => {
      document.querySelectorAll('.hero .reveal').forEach((el, i) => setTimeout(() => el.classList.add('visible'), 180 + i * 140));
    });
    document.querySelectorAll('.faq-q').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.closest('.faq-item');
        const wasOpen = item.classList.contains('open');
        document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
        if (!wasOpen) item.classList.add('open');
      });
    });

    // Product Gallery & Buy Box Variant selector logic
    const thumbItems = document.querySelectorAll('.thumb-item');
    const mainImg = document.getElementById('mainImg');
    if (thumbItems.length > 0 && mainImg) {
      thumbItems.forEach(thumb => {
        thumb.addEventListener('click', () => {
          thumbItems.forEach(t => t.classList.remove('active'));
          thumb.classList.add('active');
          mainImg.style.opacity = 0;
          setTimeout(() => {
            mainImg.src = thumb.querySelector('img').src;
            mainImg.style.opacity = 1;
          }, 150);
        });
      });
    }

    // Buy Box variants & quantity logic
    const variantCards = document.querySelectorAll('.variant-card');
    const buyQtySpan = document.getElementById('buyQty');
    const buyNowBtn = document.getElementById('buyNowBtn');
    const sbbPrice = document.getElementById('sbbPrice');
    const sbbBtn = document.getElementById('sbbBtn');
    let selectedProduct = 'double';
    let currentQty = 1;

    function updateBuyNowUrl() {
      if (!buyNowBtn) return;
      const activeCard = document.querySelector('.variant-card.active');
      if (activeCard) {
        selectedProduct = activeCard.dataset.product;
        const price = activeCard.dataset.price;
        if (sbbPrice) sbbPrice.innerHTML = `$${price * currentQty} <small>USD</small>`;
      }
      const finalUrl = `orderform.html?product=${selectedProduct}&qty=${currentQty}`;
      buyNowBtn.href = finalUrl;
      if (sbbBtn) sbbBtn.href = finalUrl;
    }

    if (variantCards.length > 0) {
      variantCards.forEach(card => {
        card.addEventListener('click', () => {
          variantCards.forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          
          if (card.dataset.product === 'bundle') {
            const bundleThumb = document.querySelector('.thumb-item[data-index="3"]');
            if (bundleThumb) bundleThumb.click();
          } else {
            const defaultThumb = document.querySelector('.thumb-item[data-index="0"]');
            if (defaultThumb) defaultThumb.click();
          }
          
          updateBuyNowUrl();
        });
      });
    }

    const minusBtn = document.querySelector('.qty-btn.minus');
    const plusBtn = document.querySelector('.qty-btn.plus');

    if (minusBtn && plusBtn && buyQtySpan) {
      minusBtn.addEventListener('click', () => {
        if (currentQty > 1) {
          currentQty--;
          buyQtySpan.textContent = currentQty;
          updateBuyNowUrl();
        }
      });
      plusBtn.addEventListener('click', () => {
        if (currentQty < 10) {
          currentQty++;
          buyQtySpan.textContent = currentQty;
          updateBuyNowUrl();
        }
      });
    }

    updateBuyNowUrl();

    // Sticky Product Nav & Bottom Buy Bar Scroll Logic
    const productNav = document.getElementById('productNav');
    const stickyBuyBar = document.getElementById('stickyBuyBar');
    const sections = document.querySelectorAll('section[id]');
    const productNavLinks = document.querySelectorAll('.product-nav-links a');

    window.addEventListener('scroll', () => {
      if (window.scrollY > 600) {
        if (productNav) productNav.classList.add('visible');
        if (stickyBuyBar) stickyBuyBar.classList.add('visible');
      } else {
        if (productNav) productNav.classList.remove('visible');
        if (stickyBuyBar) stickyBuyBar.classList.remove('visible');
      }

      let current = '';
      sections.forEach(section => {
        const sectionTop = section.offsetTop;
        if (pageYOffset >= sectionTop - 150) {
          current = section.getAttribute('id');
        }
      });

      productNavLinks.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href').includes(current)) {
          link.classList.add('active');
        }
      });
    });
  </script>
